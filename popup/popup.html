<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stricked Keyword Blocker</title>
    <link rel="stylesheet" href="popup.css">
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"> -->
     <link rel="stylesheet" href="../libs/bootstrap.css">
</head>
<body class="bg-dark border border-white border-2 overflow-hidden">

  <div class="popup ms-2 text-bg-dark">
    <!-- <h1 class="title">Blocker</h1> -->
    <div class="row">
       <h1 class="col-9 ms-auto text-success fw-bold">ClearTab</h1>
    </div>
    <div class="row">
        <form class="block-form">
          <input class="col-8" type="text" id="blockWord" name="blockWord" placeholder="Enter a word to block">
        </form>
     </div>

     <div class="row">
        <label class="col-6 col-sm-3" for="followSchedule">Follow Schedule</label>
        <input class="col-1 col-sm-3" type="checkbox" id="followSchedule" name="followSchedule">
     </div>
     
      <div class="actions row">
        <button class="col-3 m-4 btn btn-dark text-white border border-white" type="button" id="add" class="primary">Add</button>
        <button class="col-3 m-4 btn btn-dark text-white border border-white" type="button" id="settings" class="secondary">Settings</button>
      </div>

      <div class="disable-BGM-container row">
        <label class="col-6 col-sm-3" for="disable-BGM ">Disable BGM</label>
        <input class="col-1 col-sm-3" type="checkbox" id="disable-BGM" name="disable-BGM" value="newsletter">
      </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
