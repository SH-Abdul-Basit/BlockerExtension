<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Keyword Blocker - Settings</title>
    <link rel="stylesheet" href="settings.css">
    <link rel="stylesheet" href="../libs/bootstrap.css">
</head>
<body class="bg-dark text-white ">
    <h2>Blocked Words</h2>  
    <div id="root"></div>
    <div id="schedule">
        <h3>Schedule</h3>
        <label for="startTime">Start Time:</label>
        <input type="time" id="startTime" name="startTime">
        <label for="endTime">End Time:</label>
        <input type="time" id="endTime" name="endTime">
        <button id="saveSchedule">Save Schedule</button>
    </div>
    <button id="password">Set Password</button>
    <button id="importSettingsButton">Import</button>
    <input type="file" id="jsonImport" style="display: none;">
    <script src="settings.js"></script>
</body>
</html>
